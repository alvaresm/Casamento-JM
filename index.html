<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcus & Juliana</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f5f5f5; margin: 0; }
    .container { padding: 30px; }
    .box { background: #fff; padding: 20px; margin: 20px auto; max-width: 400px; border-radius: 10px; }
    h1 { margin-bottom: 5px; }
    button { padding: 10px 15px; border: none; background: #444; color: #fff; border-radius: 5px; cursor: pointer; }
    iframe { width: 100%; height: 250px; border: 0; border-radius: 10px; }
  </style>
</head>
<body>

<div class="container">

  <h1>Marcus & Juliana</h1>
  <p>26 de Setembro de 2026</p>

  <div class="box">
    <h3>Confirmação de Presença</h3>
    <form onsubmit="confirmar(event)">
      <input type="text" placeholder="Seu nome" required><br><br>
      <button type="submit">Confirmar</button>
    </form>
    <p id="msg"></p>
  </div>

  <div class="box">
    <h3>Local</h3>
    <p>Paróquia Ascensão do Senhor</p>
    <iframe src="https://www.google.com/maps?q=Paróquia+Ascensão+do+Senhor+Salvador&output=embed"></iframe>
  </div>

  <div class="box">
    <h3>Presente</h3>
    <p>PIX: <strong>04325780564</strong></p>
  </div>

</div>

<script>
function confirmar(e){
  e.preventDefault();
  document.getElementById('msg').innerText = 'Presença confirmada!';
}
</script>

</body>
</html>
